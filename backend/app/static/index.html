<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Management MVP</title>
    <style>
      :root {
        color: #032147;
        background: #f7f8fb;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem;
      }

      section {
        max-width: 42rem;
        border: 1px solid rgba(3, 33, 71, 0.08);
        border-radius: 1.5rem;
        background: white;
        padding: 2rem;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
      }

      p {
        color: #888888;
        line-height: 1.6;
      }

      code {
        color: #753991;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Project Management MVP</h1>
        <p>
          FastAPI is serving this static hello world page. The API is available
          at <code>/api/health</code>.
        </p>
      </section>
    </main>
  </body>
</html>
